<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBD Region Selector - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DBD Region Selector - Admin Panel</h1>
            <p class="subtitle">Admin Panel</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <span class="stat-number" id="total-keys">-</span>
                <span class="stat-label">Total Keys</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="active-keys">-</span>
                <span class="stat-label">Activated</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="inactive-keys">-</span>
                <span class="stat-label">Available</span>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="search" placeholder="Search key or HWID..." oninput="filterKeys()">
        </div>

        <table id="keys-table">
            <thead>
                <tr>
                    <th>Key</th>
                    <th>Status</th>
                    <th>HWID</th>
                    <th>Activated</th>
                    <th>Last Session</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="keys-body">
                <tr><td colspan="6" class="loading">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Generar keys model-->
    <div class="modal" id="generate-modal">
        <div class="modal-content">
            <h2>Generate Keys</h2>
            <label>Amount</label>
            <input type="number" id="generate-amount" value="1" min="1" max="100">
            <div class="modal-actions">
                <button onclick="generateKeys()">Generate</button>
                <button class="secondary" onclick="closeModal()">Cancel</button>
            </div>
            <div id="generated-keys-list"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
